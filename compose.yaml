services:
  universal:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
    ports:
      - "8000:8000"
    # depends_on:
      # - redis
    env_file: .env

  postgres:
    image: postgres
    shm_size: 128M
    ports:
      - "5432:5432"
    volumes:
      - ${PWD}/build/create_database_psql.sh:/docker-entrypoint-initdb.d/create_database_psql.sh
      # - .init_db/demo-big-20170815.sql:/docker-entrypoint-initdb.d/demo-big-20170815.sql
      - db-data:/var/lib/postgresql/
    env_file: .env-pg
    # environment:
    # - POSTGRES_USER=postgres
    # - POSTGRES_PASSWORD=postgres
    # - POSTGRES_DB=postgres
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 4G

volumes:
  db-data:
